[build]
  # Node.js version
  command = "npm run build"
  
[build.environment]
  # Set Node.js version to 20.19.0 or higher
  NODE_VERSION = "20.19.0"
  NPM_VERSION = "10.8.2"
  # Canonical URL for sitemap, robots, and OG tags (do not use localhost here)
  NUXT_SITE_URL = "https://ukpubs.co.uk"
  NUXT_PUBLIC_APP_URL = "https://ukpubs.co.uk"
  NUXT_PUBLIC_API_URL = "https://ukpubs.co.uk"
  # Set your Mapbox public token in Netlify UI (Site settings → Environment variables)
  # NUXT_PUBLIC_MAPBOX_TOKEN = your Mapbox public token (pk.*)
  # DATABASE_URL must use Supabase Transaction pooler :6543 with ?pgbouncer=true (not :5432)

# Headers for performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Nuxt/Nitro serverless — allow time to build large sitemaps
[functions]
  node_bundler = "esbuild"

[functions."*"]
  timeout = 26
